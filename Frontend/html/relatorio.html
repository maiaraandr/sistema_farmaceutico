<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios | FarmaSys</title>

    <!-- CSS base do sistema -->
    <link rel="stylesheet" href="../CSS/Style.css">
    <link rel="stylesheet" href="../CSS/Components.css">
    <link rel="stylesheet" href="../CSS/dashboard.css">
    <link rel="stylesheet" href="../CSS/Table_styles.css">

    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Ajustes locais (mesmo tom azul do auth) -->
    <style>
        :root{
            --brand: #2563eb;
            --brand-600: #1d4ed8;
            --brand-100: rgba(37, 99, 235, 0.12);
        }

        .page-title i{ color: var(--brand); }

        .kpi-mini-grid{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 14px;
        }
        .kpi-mini{
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 14px;
            display:flex;
            gap: 12px;
            align-items:center;
        }
        .kpi-mini .kpi-icon{
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--brand-100);
            color: var(--brand);
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .kpi-mini .kpi-label{
            font-size: 12px;
            color: var(--gray-600);
        }
        .kpi-mini .kpi-value{
            font-weight: 700;
            font-size: 18px;
            color: var(--gray-900);
        }

        .filters-row{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            align-items:center;
            justify-content:space-between;
        }
        .filters-left{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            align-items:center;
        }

        .btn-primary{
            background: var(--brand);
            border-color: var(--brand);
        }
        .btn-primary:hover{
            background: var(--brand-600);
            border-color: var(--brand-600);
        }

        .table-actions{
            display:flex;
            gap:10px;
            align-items:center;
            flex-wrap:wrap;
        }

        .badge-pill{
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--gray-200);
            background: var(--gray-50);
        }
        .badge-in{ background: rgba(34,197,94,.12); color:#16a34a; border-color: rgba(34,197,94,.25); }
        .badge-out{ background: rgba(239,68,68,.12); color:#dc2626; border-color: rgba(239,68,68,.25); }
    </style>
</head>
<body>

<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <i data-lucide="pill"></i>
                </div>
                <span>FarmaSys</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="medicamentos.html" class="nav-item">
                <i data-lucide="package"></i>
                <span>Medicamentos</span>
            </a>
            <a href="fornecedores.html" class="nav-item">
                <i data-lucide="truck"></i>
                <span>Fornecedores</span>
            </a>
            <a href="entrada.html" class="nav-item">
                <i data-lucide="package-plus"></i>
                <span>Entrada</span>
            </a>
            <a href="saida.html" class="nav-item">
                <i data-lucide="package-minus"></i>
                <span>Saída</span>
            </a>

            <!-- ATENÇÃO: seu arquivo atual chama relatorio.html (singular) -->
            <a href="relatorio.html" class="nav-item active">
                <i data-lucide="file-text"></i>
                <span>Relatórios</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="nav-item" id="logoutBtn">
                <i data-lucide="log-out"></i>
                <span>Sair</span>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <!-- Header -->
        <header class="content-header">
            <div class="header-left">
                <h1 class="page-title">
                    <i data-lucide="file-text"></i>
                    Relatórios
                </h1>
                <p class="page-subtitle">Resumo consolidado de entradas e saídas</p>
            </div>

            <div class="header-right">
                <div class="user-info">
                    <span class="user-name" id="userName">Carregando...</span>
                </div>
            </div>
        </header>

        <!-- KPIs -->
        <div class="kpi-mini-grid">
            <div class="kpi-mini">
                <div class="kpi-icon"><i data-lucide="package-plus"></i></div>
                <div>
                    <div class="kpi-label">Total de Entradas</div>
                    <div class="kpi-value" id="totalEntradas">0</div>
                </div>
            </div>

            <div class="kpi-mini">
                <div class="kpi-icon"><i data-lucide="package-minus"></i></div>
                <div>
                    <div class="kpi-label">Total de Saídas</div>
                    <div class="kpi-value" id="totalSaidas">0</div>
                </div>
            </div>

            <div class="kpi-mini">
                <div class="kpi-icon"><i data-lucide="layers"></i></div>
                <div>
                    <div class="kpi-label">Saldo Atual</div>
                    <div class="kpi-value" id="saldo">0</div>
                </div>
            </div>
        </div>

        <!-- Tabela / Filtros -->
        <section class="content-section">
            <div class="card">
                <div class="card-header">
                    <div class="filters-row">
                        <div class="filters-left">
                            <h3 class="card-title" style="display:flex;align-items:center;gap:10px;margin:0;">
                                <i data-lucide="list"></i>
                                Histórico Consolidado
                            </h3>

                            <span class="badge-pill" id="badgeTotalLinhas">
                                <i data-lucide="hash" style="width:14px;height:14px;"></i>
                                <span id="totalLinhas">0</span> registros
                            </span>
                        </div>

                        <div class="table-actions">
                            <div class="search-box" style="max-width:360px;">
                                <i data-lucide="search"></i>
                                <input type="text" id="searchRelatorio" placeholder="Buscar por medicamento, fornecedor ou destino...">
                            </div>

                            <select id="filterTipo" class="filter-select" style="min-width: 180px;">
                                <option value="">Todos os tipos</option>
                                <option value="entrada">Entradas</option>
                                <option value="saida">Saídas</option>
                            </select>

                            <a href="dashboard.html" class="btn btn-outline btn-sm">
                                <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
                                Voltar
                            </a>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Tipo</th>
                                    <th>Medicamento</th>
                                    <th>Quantidade</th>
                                    <th>Fornecedor / Destino</th>
                                    <th>Data</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaRelatorios"></tbody>
                        </table>
                    </div>

                    <div class="pagination" id="paginationRelatorios"></div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="../Javascript/Storage.js"></script>
<script src="../Javascript/relatorios.js"></script>

<script>
  lucide.createIcons();
</script>


</body>
</html>
