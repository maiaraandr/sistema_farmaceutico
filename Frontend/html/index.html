<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema Farmacêutico</title>
    <link rel="stylesheet" href="../CSS/Auth_minimal.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-container">
        <div class="login-box">
          <div class="auth-icon">
            <i data-lucide="pill"></i>
          </div>

          <div id="loginError" class="message error hidden"></div>

          <form id="loginForm">
            <div class="form-field">
              <div class="input-wrapper">
                <i
                  data-lucide="user"
                  class="input-icon"
                  style="width: 18px; height: 18px"
                ></i>
                <input
                  type="text"
                  id="username"
                  placeholder="USERNAME"
                  required
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i
                  data-lucide="lock"
                  class="input-icon"
                  style="width: 18px; height: 18px"
                ></i>

                <div class="password-wrapper">
                  <input
                    type="password"
                    id="password"
                    placeholder="PASSWORD"
                    required
                    autocomplete="current-password"
                  />

                  <button
                    type="button"
                    class="password-toggle"
                    id="togglePassword"
                    aria-label="Mostrar ou ocultar senha"
                  >
                    <i data-lucide="eye" style="width: 18px; height: 18px"></i>
                  </button>
                </div>
              </div>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
              Login
            </button>

            <div class="auth-link" style="margin-top: 10px">
              <a href="recuperar-senha.html">Esqueceu a senha?</a>
            </div>

            <div class="auth-link">
              <a href="cadastro.html">Novo usuário?</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../Javascript/Storage.js"></script>
    <script src="../Javascript/autenticacao.js"></script>

    <script>
      redirectIfAuthenticated();
      lucide.createIcons();

      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      if (usernameInput) {
        usernameInput.focus();
      }

      function mostrarErro(msg) {
        loginError.textContent = msg;
        loginError.classList.remove('hidden');

        setTimeout(() => {
          loginError.classList.add('hidden');
        }, 2000);
      }

      togglePasswordBtn.addEventListener('click', function () {
        const icon = this.querySelector('i');
        if (!icon) return;

        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          icon.setAttribute('data-lucide', 'eye-off');
        } else {
          passwordInput.type = 'password';
          icon.setAttribute('data-lucide', 'eye');
        }

        lucide.createIcons();
      });

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        loginError.classList.add('hidden');
        loginBtn.disabled = true;
        loginBtn.textContent = 'Entrando...';

        try {
          const result = loginSistema(username, password);

          if (result.sucesso) {
            loginBtn.textContent = 'Sucesso!';
            loginBtn.style.backgroundColor = '#22c55e';
            loginBtn.style.color = '#fff';

            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 500);
          } else {
            mostrarErro('Usuário ou senha inválidos');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
          }
        } catch (error) {
          mostrarErro('Erro ao fazer login');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      });
    </script>
  </body>
</html>
