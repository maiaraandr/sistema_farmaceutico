<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - GestMed</title>

    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="login-page">
    <div class="auth-page">
      <div class="auth-container">
        <div class="login-box">
          <div class="auth-header">
            <div class="auth-icon">
              <i data-lucide="pill"></i>
            </div>

            <h1 class="login-title">GestMed</h1>

            <p class="login-subtitle">Sistema de Gestão de Medicamentos</p>
          </div>

          <div id="loginError" class="message error hidden"></div>

          <form id="loginForm" class="login-form">
            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="user" class="input-icon"></i>

                <input
                  type="text"
                  id="username"
                  placeholder="USERNAME"
                  autocomplete="username"
                  required
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>

                <div class="password-wrapper">
                  <input
                    type="password"
                    id="password"
                    placeholder="PASSWORD"
                    autocomplete="current-password"
                    required
                  />

                  <button
                    type="button"
                    class="password-toggle"
                    id="togglePassword"
                    aria-label="Mostrar ou ocultar senha"
                  >
                    <span id="togglePasswordIcon">
                      <i data-lucide="eye"></i>
                    </span>
                  </button>
                </div>
              </div>
            </div>

            <button type="submit" class="btn-primary login-btn" id="loginBtn">
              Login
            </button>

            <div class="auth-link" style="margin-top: 10px">
              <a href="recuperar_senha.html"> Esqueceu a senha? </a>
            </div>

            <!-- Só aparece para admin logado -->
            <div class="auth-link" id="linkCadastro" style="display: none">
              <a href="cadastro.html"> Novo usuário? </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../Javascript/Storage.js"></script>
    <script src="../Javascript/autenticacao.js"></script>

    <script>
      lucide.createIcons();

      const API_BASE_URL =
        'https://sistemafarmaceutico-production.up.railway.app/api';

      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      const togglePasswordBtn = document.getElementById('togglePassword');
      const togglePasswordIcon = document.getElementById('togglePasswordIcon');

      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      // Mostra o link de cadastro apenas se já estiver logado como admin
      (function () {
        try {
          const user = JSON.parse(localStorage.getItem('farm_current_user'));
          const token = localStorage.getItem('farm_session_token');
          if (user && token && user.is_admin === true) {
            document.getElementById('linkCadastro').style.display = '';
          }
        } catch (_) {}
      })();

      if (usernameInput) {
        usernameInput.focus();
      }

      function mostrarErro(mensagem) {
        loginError.textContent = mensagem;

        loginError.classList.remove('hidden');

        setTimeout(() => {
          loginError.classList.add('hidden');
        }, 3000);
      }

      togglePasswordBtn.addEventListener('click', () => {
        const mostrandoSenha = passwordInput.type === 'text';

        passwordInput.type = mostrandoSenha ? 'password' : 'text';

        togglePasswordIcon.innerHTML = mostrandoSenha
          ? '<i data-lucide="eye"></i>'
          : '<i data-lucide="eye-off"></i>';

        lucide.createIcons();
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        loginError.classList.add('hidden');

        loginBtn.disabled = true;
        loginBtn.textContent = 'Entrando...';

        try {
          const response = await fetch(`${API_BASE_URL}/login/`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              usuario: username,
              senha: password,
            }),
          });

          const data = await response.json();

          if (!response.ok || !data.sucesso) {
            mostrarErro(data.erro || 'Usuário ou senha inválidos.');

            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';

            return;
          }

          localStorage.setItem(
            'farm_current_user',
            JSON.stringify(data.usuario)
          );

          localStorage.setItem('farm_session_token', `token_${Date.now()}`);

          loginBtn.textContent = 'Sucesso!';
          loginBtn.style.backgroundColor = '#22c55e';
          loginBtn.style.color = '#fff';

          setTimeout(() => {
            window.location.href = '/html/inicio.html';
          }, 500);
        } catch (error) {
          mostrarErro('Não foi possível conectar ao servidor.');

          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      });
    </script>
  </body>
</html>
