<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Senha - Sistema Farmacêutico</title>

    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="recovery-page">
    <div class="auth-page">
      <div class="auth-container">
        <div class="login-box">
          <div class="auth-header">
            <div class="auth-icon">
              <i data-lucide="key-round"></i>
            </div>

            <h1 class="recovery-title">Recuperar Senha</h1>

            <p class="recovery-subtitle">
              Digite seu e-mail cadastrado para receber as instruções de
              recuperação
            </p>
          </div>

          <div id="recoveryError" class="message error hidden"></div>
          <div id="recoverySuccess" class="success-message hidden"></div>
          <div id="recoveryInfo" class="message info hidden"></div>

          <form id="recoveryForm" class="recovery-form">
            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="mail" class="input-icon"></i>

                <input
                  type="email"
                  id="email"
                  placeholder="E-MAIL"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <button
              type="submit"
              class="btn-primary recovery-btn"
              id="recoveryBtn"
            >
              Enviar Instruções
            </button>

            <div class="auth-link">
              <a href="index.html">Voltar ao Login</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();
      document.getElementById('email').focus();

      const API_BASE_URL = 'https://gestmed.onrender.com/api';

      // Tenta a requisição até MAX_TENTATIVAS vezes com delay entre elas
      async function fetchComRetry(
        url,
        options,
        maxTentativas = 4,
        delayMs = 8000
      ) {
        let ultimoErro;

        for (let tentativa = 1; tentativa <= maxTentativas; tentativa++) {
          try {
            const controller = new AbortController();
            // Timeout de 20s por tentativa (Render pode demorar para acordar)
            const timeout = setTimeout(() => controller.abort(), 20000);

            const response = await fetch(url, {
              ...options,
              signal: controller.signal,
            });

            clearTimeout(timeout);
            return response; // sucesso — retorna imediatamente
          } catch (err) {
            ultimoErro = err;

            if (tentativa < maxTentativas) {
              atualizarBotao(
                `Servidor iniciando... (${tentativa}/${maxTentativas})`
              );
              mostrarInfo(
                `O servidor está acordando, isso pode levar alguns segundos. Tentativa ${tentativa} de ${maxTentativas}...`
              );
              await esperar(delayMs);
            }
          }
        }

        throw ultimoErro; // esgotou todas as tentativas
      }

      function esperar(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function atualizarBotao(texto) {
        document.getElementById('recoveryBtn').textContent = texto;
      }

      function mostrarInfo(texto) {
        const el = document.getElementById('recoveryInfo');
        el.textContent = texto;
        el.classList.remove('hidden');
      }

      function ocultarInfo() {
        document.getElementById('recoveryInfo').classList.add('hidden');
      }

      document
        .getElementById('recoveryForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();

          const email = document.getElementById('email').value.trim();
          const btn = document.getElementById('recoveryBtn');
          const errorDiv = document.getElementById('recoveryError');
          const successDiv = document.getElementById('recoverySuccess');

          errorDiv.classList.add('hidden');
          successDiv.classList.add('hidden');
          ocultarInfo();

          if (!validarEmail(email)) {
            errorDiv.textContent = 'Por favor, digite um e-mail válido.';
            errorDiv.classList.remove('hidden');
            return;
          }

          btn.disabled = true;
          atualizarBotao('Enviando...');

          try {
            const response = await fetchComRetry(
              `${API_BASE_URL}/recuperar-senha/`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email }),
              }
            );

            ocultarInfo();

            const data = await response.json();

            if (!response.ok) {
              errorDiv.textContent =
                data.erro || 'Erro ao solicitar recuperação de senha.';
              errorDiv.classList.remove('hidden');
            } else {
              successDiv.textContent =
                data.mensagem ||
                'Se o e-mail estiver cadastrado, você receberá as instruções em alguns minutos.';
              successDiv.classList.remove('hidden');
              document.getElementById('recoveryForm').reset();
            }
          } catch (error) {
            ocultarInfo();
            errorDiv.textContent =
              'Não foi possível conectar ao servidor após várias tentativas. Aguarde um momento e tente novamente.';
            errorDiv.classList.remove('hidden');
          } finally {
            btn.disabled = false;
            atualizarBotao('Enviar Instruções');
          }
        });

      function validarEmail(email) {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(email);
      }
    </script>
  </body>
</html>
