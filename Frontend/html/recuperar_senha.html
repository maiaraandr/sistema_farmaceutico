<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Sistema Farmacêutico</title>
    <link rel="stylesheet" href="../CSS/Auth_minimal.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="login-box">
                <div class="auth-icon">
                    <i data-lucide="key-round"></i>
                </div>
                
                <h1 class="login-title">Recuperar Senha</h1>
                
                <p style="color: rgba(255, 255, 255, 0.8); text-align: center; margin-bottom: 30px; font-size: 14px;">
                    Digite seu e-mail cadastrado para receber as instruções de recuperação
                </p>
                
                <div id="recoveryError" class="message error hidden"></div>
                <div id="recoverySuccess" class="message success hidden"></div>
                
                <!-- Link de recuperação da senha: simulação ainda -->
                <div id="recoveryLink" class="message success hidden" style="text-align: left; word-break: break-all;">
                    <p style="margin-bottom: 10px; font-weight: 600;">
                        <i data-lucide="mail-check" style="width: 16px; height: 16px; vertical-align: middle;"></i>
                        Link de Recuperação (Simulado):
                    </p>
                    <p style="font-size: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 4px; word-break: break-all;" id="linkText"></p>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-primary" onclick="copiarLink()" style="margin: 0; width: auto; padding: 10px 20px; font-size: 12px;">
                            <i data-lucide="copy" style="width: 14px; height: 14px; vertical-align: middle;"></i>
                            Copiar Link
                        </button>
                        <button type="button" class="btn-primary" onclick="abrirLink()" style="margin: 0; width: auto; padding: 10px 20px; font-size: 12px; background: #22c55e;">
                            <i data-lucide="external-link" style="width: 14px; height: 14px; vertical-align: middle;"></i>
                            Abrir Agora
                        </button>
                    </div>
                    <p style="font-size: 11px; margin-top: 10px; opacity: 0.8;">
                        💡 Em produção, este link seria enviado por e-mail
                    </p>
                </div>
                
                <form id="recoveryForm">
                    <div class="form-field">
                        <div class="input-wrapper">
                            <i data-lucide="mail" class="input-icon" style="width: 18px; height: 18px;"></i>
                            <input 
                                type="email" 
                                id="email" 
                                placeholder="E-MAIL"
                                required
                                autocomplete="email"
                            >
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="recoveryBtn">Enviar Instruções</button>
                    
                    <div class="auth-link">
                        <a href="index.html">
                            <i data-lucide="arrow-left" style="width: 14px; height: 14px; vertical-align: middle;"></i>
                            Voltar ao Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../Javascript/Storage.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('email').focus();

        document.getElementById('recoveryForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('recoveryBtn');
            const errorDiv = document.getElementById('recoveryError');
            const successDiv = document.getElementById('recoverySuccess');
            
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            if (!validarEmail(email)) {
                errorDiv.textContent = 'Por favor, digite um e-mail válido';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            const users = getUsers();
            const usuario = users.find(u => (u.email || '').toLowerCase() === email.toLowerCase());
            
            btn.disabled = true;
            btn.textContent = 'Enviando...';
            
            setTimeout(() => {
                if (usuario) {
                    const token = gerarToken();
                    const recuperacao = {
                        email: email,
                        token: token,
                        dataExpiracao: new Date(Date.now() + 3600000).toISOString(),
                        usado: false
                    };
                    
                    localStorage.setItem('recovery_token_' + email, JSON.stringify(recuperacao));
                    
                    const link = window.location.origin +
                        window.location.pathname.replace('recuperar_senha.html', 'reset_password.html') +
                        '?token=' + token + '&email=' + encodeURIComponent(email);

                    window.recoveryLink = link;
                    
                    document.getElementById('linkText').textContent = link;
                    document.getElementById('recoveryLink').classList.remove('hidden');
                    document.getElementById('recoveryForm').style.display = 'none';
                    
                    lucide.createIcons();
                } else {
                    successDiv.textContent = 'Se o e-mail estiver cadastrado, você receberá as instruções em alguns minutos.';
                    successDiv.classList.remove('hidden');
                    
                    btn.disabled = false;
                    btn.textContent = 'Enviar Instruções';
                }
            }, 2000);
        });

        function copiarLink() {
            const linkText = document.getElementById('linkText').textContent;

            navigator.clipboard.writeText(linkText).then(() => {
                alert('✅ Link copiado! Cole no navegador para redefinir sua senha.');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = linkText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ Link copiado! Cole no navegador para redefinir sua senha.');
            });
        }

        function abrirLink() {
            if (window.recoveryLink) window.location.href = window.recoveryLink;
        }

        function validarEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function gerarToken() {
            return Math.random().toString(36).substring(2) +
                   Date.now().toString(36) +
                   Math.random().toString(36).substring(2);
        }
    </script>
</body>
</html>
