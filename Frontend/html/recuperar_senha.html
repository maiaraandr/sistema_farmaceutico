<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Senha - Sistema Farmacêutico</title>

    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="recovery-page">
    <div class="auth-page">
      <div class="auth-container">
        <div class="login-box">
          <div class="auth-header">
            <div class="auth-icon">
              <i data-lucide="key-round"></i>
            </div>

            <h1 class="recovery-title">Recuperar Senha</h1>

            <p class="recovery-subtitle">
              Digite seu e-mail cadastrado para receber as instruções de
              recuperação
            </p>
          </div>

          <div id="recoveryError" class="message error hidden"></div>
          <div id="recoverySuccess" class="success-message hidden"></div>

          <form id="recoveryForm" class="recovery-form">
            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="mail" class="input-icon"></i>

                <input
                  type="email"
                  id="email"
                  placeholder="E-MAIL"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <button
              type="submit"
              class="btn-primary recovery-btn"
              id="recoveryBtn"
            >
              Enviar Instruções
            </button>

            <div class="auth-link">
              <a href="index.html"> Voltar ao Login </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();
      document.getElementById('email').focus();

      const API_BASE_URL = 'https://gestmed.onrender.com/api';

      document
        .getElementById('recoveryForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();

          const email = document.getElementById('email').value.trim();
          const btn = document.getElementById('recoveryBtn');
          const errorDiv = document.getElementById('recoveryError');
          const successDiv = document.getElementById('recoverySuccess');

          errorDiv.classList.add('hidden');
          successDiv.classList.add('hidden');

          if (!validarEmail(email)) {
            errorDiv.textContent = 'Por favor, digite um e-mail válido';
            errorDiv.classList.remove('hidden');
            return;
          }

          btn.disabled = true;
          btn.textContent = 'Enviando...';

          try {
            const response = await fetch(`${API_BASE_URL}/recuperar-senha/`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ email }),
            });

            const data = await response.json();

            if (!response.ok) {
              errorDiv.textContent =
                data.erro || 'Erro ao solicitar recuperação de senha.';
              errorDiv.classList.remove('hidden');
              btn.disabled = false;
              btn.textContent = 'Enviar Instruções';
              return;
            }

            successDiv.textContent =
              data.mensagem ||
              'Se o e-mail estiver cadastrado, você receberá as instruções em alguns minutos.';
            successDiv.classList.remove('hidden');

            document.getElementById('recoveryForm').reset();
            btn.disabled = false;
            btn.textContent = 'Enviar Instruções';
          } catch (error) {
            errorDiv.textContent = 'Não foi possível conectar ao servidor.';
            errorDiv.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Enviar Instruções';
          }
        });

      function validarEmail(email) {
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return regex.test(email);
      }
    </script>
  </body>
</html>
