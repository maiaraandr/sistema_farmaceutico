<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha - GestMed</title>
    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="reset-page">
    <div class="auth-page">
      <div class="auth-container">
        <div class="login-box">
          <div class="auth-header">
            <div class="auth-icon">
              <i data-lucide="lock-keyhole"></i>
            </div>

            <h1 class="reset-title">Redefinir Senha</h1>
            <p class="reset-subtitle">
              Digite sua nova senha para concluir a recuperação
            </p>
          </div>

          <div id="resetError" class="message error hidden"></div>
          <div id="resetSuccess" class="success-message hidden"></div>

          <form id="resetForm" class="reset-form">
            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <div class="password-wrapper">
                  <input
                    type="password"
                    id="novaSenha"
                    placeholder="NOVA SENHA"
                    required
                    minlength="6"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    onclick="togglePassword('novaSenha', this)"
                  >
                    <i data-lucide="eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <div class="password-wrapper">
                  <input
                    type="password"
                    id="confirmarSenha"
                    placeholder="CONFIRMAR SENHA"
                    required
                    minlength="6"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    onclick="togglePassword('confirmarSenha', this)"
                  >
                    <i data-lucide="eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <button type="submit" class="btn-primary reset-btn" id="resetBtn">
              Salvar Nova Senha
            </button>

            <div class="auth-link">
              <a href="index.html">Voltar ao Login</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      const API_BASE_URL = 'https://sistema-farmaceutico.onrender.com/api';

      function getParam(nome) {
        return new URL(window.location.href).searchParams.get(nome);
      }

      function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.setAttribute('data-lucide', 'eye-off');
        } else {
          input.type = 'password';
          icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
      }

      function validarSenhasEmTempoReal() {
        const novaSenha = document.getElementById('novaSenha').value.trim();
        const confirmarSenha = document
          .getElementById('confirmarSenha')
          .value.trim();
        const errorDiv = document.getElementById('resetError');
        const successDiv = document.getElementById('resetSuccess');

        successDiv.classList.add('hidden');

        if (!novaSenha || !confirmarSenha) {
          errorDiv.classList.add('hidden');
          return true;
        }

        if (novaSenha !== confirmarSenha) {
          errorDiv.textContent = 'As senhas não coincidem.';
          errorDiv.classList.remove('hidden');
          return false;
        }

        errorDiv.classList.add('hidden');
        return true;
      }

      document
        .getElementById('novaSenha')
        .addEventListener('input', validarSenhasEmTempoReal);
      document
        .getElementById('confirmarSenha')
        .addEventListener('input', validarSenhasEmTempoReal);

      document
        .getElementById('resetForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();

          const uid = getParam('uid');
          const token = getParam('token');
          const nova_senha = document.getElementById('novaSenha').value.trim();
          const confirmar_senha = document
            .getElementById('confirmarSenha')
            .value.trim();
          const btn = document.getElementById('resetBtn');
          const errorDiv = document.getElementById('resetError');
          const successDiv = document.getElementById('resetSuccess');

          errorDiv.classList.add('hidden');
          successDiv.classList.add('hidden');

          if (!uid || !token) {
            errorDiv.textContent = 'Link inválido ou incompleto.';
            errorDiv.classList.remove('hidden');
            return;
          }

          if (nova_senha.length < 6) {
            errorDiv.textContent = 'A senha deve ter pelo menos 6 caracteres.';
            errorDiv.classList.remove('hidden');
            return;
          }

          if (nova_senha !== confirmar_senha) {
            errorDiv.textContent = 'As senhas não coincidem.';
            errorDiv.classList.remove('hidden');
            return;
          }

          btn.disabled = true;
          btn.textContent = 'Salvando...';

          try {
            const response = await fetch(`${API_BASE_URL}/redefinir-senha/`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ uid, token, nova_senha }),
            });

            const data = await response.json();

            if (!response.ok) {
              errorDiv.textContent = data.erro || 'Erro ao redefinir senha.';
              errorDiv.classList.remove('hidden');
              return;
            }

            successDiv.textContent =
              data.mensagem || 'Senha redefinida com sucesso.';
            successDiv.classList.remove('hidden');
            document.getElementById('resetForm').reset();

            setTimeout(() => {
              window.location.href = 'index.html';
            }, 2000);
          } catch (error) {
            errorDiv.textContent = 'Não foi possível conectar ao servidor.';
            errorDiv.classList.remove('hidden');
          } finally {
            btn.disabled = false;
            btn.textContent = 'Salvar Nova Senha';
          }
        });
    </script>
  </body>
</html>
