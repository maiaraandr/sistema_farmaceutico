<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha - Sistema Farmacêutico</title>
    <link rel="stylesheet" href="../CSS/Auth_minimal.css" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrapper input {
        width: 100%;
        padding-right: 45px;
      }

      .toggle-password {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.8);
        padding: 0;
      }

      .toggle-password:hover {
        color: #fff;
      }

      .toggle-password i {
        width: 18px;
        height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-container">
        <div class="login-box">
          <div class="auth-icon">
            <i data-lucide="lock-keyhole"></i>
          </div>

          <h1 class="login-title">Redefinir Senha</h1>

          <p
            style="
              color: rgba(255, 255, 255, 0.8);
              text-align: center;
              margin-bottom: 30px;
              font-size: 14px;
            "
          >
            Digite sua nova senha para concluir a recuperação
          </p>

          <div id="resetError" class="message error hidden"></div>
          <div id="resetSuccess" class="message success hidden"></div>

          <form id="resetForm">
            <div class="form-field">
              <div class="input-wrapper">
                <i
                  data-lucide="lock"
                  class="input-icon"
                  style="width: 18px; height: 18px"
                ></i>
                <input
                  type="password"
                  id="novaSenha"
                  placeholder="NOVA SENHA"
                  required
                  minlength="6"
                />
                <button
                  type="button"
                  class="toggle-password"
                  onclick="togglePassword('novaSenha', this)"
                >
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i
                  data-lucide="lock"
                  class="input-icon"
                  style="width: 18px; height: 18px"
                ></i>
                <input
                  type="password"
                  id="confirmarSenha"
                  placeholder="CONFIRMAR SENHA"
                  required
                  minlength="6"
                />
                <button
                  type="button"
                  class="toggle-password"
                  onclick="togglePassword('confirmarSenha', this)"
                >
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-primary" id="resetBtn">
              Salvar Nova Senha
            </button>

            <div class="auth-link">
              <a href="index.html">
                <i
                  data-lucide="arrow-left"
                  style="width: 14px; height: 14px; vertical-align: middle"
                ></i>
                Voltar ao Login
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      const API_BASE_URL = 'http://127.0.0.1:8000/api';

      function getParam(nome) {
        const url = new URL(window.location.href);
        return url.searchParams.get(nome);
      }

      function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');

        if (input.type === 'password') {
          input.type = 'text';
          icon.setAttribute('data-lucide', 'eye-off');
        } else {
          input.type = 'password';
          icon.setAttribute('data-lucide', 'eye');
        }

        lucide.createIcons();
      }

      function validarSenhasEmTempoReal() {
        const novaSenha = document.getElementById('novaSenha').value.trim();
        const confirmarSenha = document
          .getElementById('confirmarSenha')
          .value.trim();

        const errorDiv = document.getElementById('resetError');
        const successDiv = document.getElementById('resetSuccess');

        successDiv.classList.add('hidden');

        if (!novaSenha || !confirmarSenha) {
          errorDiv.classList.add('hidden');
          return true;
        }

        if (novaSenha !== confirmarSenha) {
          errorDiv.textContent = 'As senhas não coincidem.';
          errorDiv.classList.remove('hidden');
          return false;
        }

        errorDiv.classList.add('hidden');
        return true;
      }

      document
        .getElementById('novaSenha')
        .addEventListener('input', validarSenhasEmTempoReal);

      document
        .getElementById('confirmarSenha')
        .addEventListener('input', validarSenhasEmTempoReal);

      document
        .getElementById('resetForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();

          const uid = getParam('uid');
          const token = getParam('token');
          const nova_senha = document.getElementById('novaSenha').value.trim();
          const confirmar_senha = document
            .getElementById('confirmarSenha')
            .value.trim();

          const btn = document.getElementById('resetBtn');
          const errorDiv = document.getElementById('resetError');
          const successDiv = document.getElementById('resetSuccess');

          errorDiv.classList.add('hidden');
          successDiv.classList.add('hidden');

          if (!uid || !token) {
            errorDiv.textContent = 'Link inválido ou incompleto.';
            errorDiv.classList.remove('hidden');
            return;
          }

          if (nova_senha.length < 6) {
            errorDiv.textContent = 'A senha deve ter pelo menos 6 caracteres.';
            errorDiv.classList.remove('hidden');
            return;
          }

          if (nova_senha !== confirmar_senha) {
            errorDiv.textContent = 'As senhas não coincidem.';
            errorDiv.classList.remove('hidden');
            return;
          }

          btn.disabled = true;
          btn.textContent = 'Salvando...';

          try {
            const response = await fetch(`${API_BASE_URL}/redefinir-senha/`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                uid,
                token,
                nova_senha,
              }),
            });

            const data = await response.json();

            if (!response.ok) {
              errorDiv.textContent = data.erro || 'Erro ao redefinir senha.';
              errorDiv.classList.remove('hidden');
              btn.disabled = false;
              btn.textContent = 'Salvar Nova Senha';
              return;
            }

            successDiv.textContent =
              data.mensagem || 'Senha redefinida com sucesso.';
            successDiv.classList.remove('hidden');

            document.getElementById('resetForm').reset();
            btn.disabled = false;
            btn.textContent = 'Salvar Nova Senha';

            setTimeout(() => {
              window.location.href = 'index.html';
            }, 2000);
          } catch (error) {
            errorDiv.textContent = 'Não foi possível conectar ao servidor.';
            errorDiv.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Salvar Nova Senha';
          }
        });
    </script>
  </body>
</html>
