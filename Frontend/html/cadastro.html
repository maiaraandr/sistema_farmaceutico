<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - GestMed</title>
    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />
  </head>

  <body class="register-page">
    <div class="auth-page">
      <div class="auth-container auth-wide">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-icon">
              <i data-lucide="user-plus"></i>
            </div>
            <h1 class="register-title">Cadastro de Usuário</h1>
            <p class="register-subtitle">Crie seu acesso ao sistema</p>
          </div>

          <div id="registerError" class="message error hidden"></div>
          <div id="registerSuccess" class="success-message hidden"></div>

          <form
            id="registerForm"
            class="register-form"
            autocomplete="off"
            novalidate
          >
            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="user" class="input-icon"></i>
                <input
                  type="text"
                  id="nome"
                  placeholder="NOME COMPLETO"
                  required
                  autocomplete="name"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="mail" class="input-icon"></i>
                <input
                  type="email"
                  id="email"
                  placeholder="E-MAIL"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="phone" class="input-icon"></i>
                <input
                  type="tel"
                  id="telefone"
                  placeholder="TELEFONE"
                  inputmode="tel"
                  autocomplete="tel"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="user-check" class="input-icon"></i>
                <input
                  type="text"
                  id="usuario"
                  placeholder="USUÁRIO"
                  required
                  minlength="4"
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <div class="password-wrapper">
                  <input
                    type="password"
                    id="senha"
                    placeholder="SENHA"
                    required
                    minlength="6"
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    id="toggleSenha"
                    aria-label="Mostrar ou ocultar senha"
                  >
                    <i data-lucide="eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <div class="password-wrapper">
                  <input
                    type="password"
                    id="senhaConfirm"
                    placeholder="CONFIRMAR SENHA"
                    required
                    minlength="6"
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    id="toggleSenhaConfirm"
                    aria-label="Mostrar ou ocultar confirmação de senha"
                  >
                    <i data-lucide="eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <button
              type="submit"
              class="btn-primary register-btn"
              id="registerBtn"
            >
              Cadastrar
            </button>

            <div class="auth-link">
              <a href="index.html">Já tem conta? Fazer login</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Lucide antes dos scripts que dependem dele -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../Javascript/Storage.js"></script>
    <script src="../Javascript/autenticacao.js"></script>
    <script src="../Javascript/Cadastro.js"></script>
  </body>
</html>
