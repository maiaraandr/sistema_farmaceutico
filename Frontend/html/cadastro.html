<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - GestMed</title>
    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="register-page">
    <div class="auth-page">
      <div class="auth-container auth-wide">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-icon">
              <i data-lucide="user-plus"></i>
            </div>
            <h1 class="register-title">Cadastro de Usuário</h1>
            <p class="register-subtitle">Crie seu acesso ao sistema</p>
          </div>

          <div id="registerError" class="message error hidden"></div>
          <div id="registerSuccess" class="success-message hidden"></div>

          <form
            id="registerForm"
            class="register-form"
            autocomplete="off"
            novalidate
          >
            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="user" class="input-icon"></i>
                <input
                  type="text"
                  id="nome"
                  placeholder="NOME COMPLETO"
                  required
                  autocomplete="name"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="mail" class="input-icon"></i>
                <input
                  type="email"
                  id="email"
                  placeholder="E-MAIL"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="phone" class="input-icon"></i>
                <input
                  type="tel"
                  id="telefone"
                  placeholder="TELEFONE"
                  inputmode="tel"
                  autocomplete="tel"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="user-check" class="input-icon"></i>
                <input
                  type="text"
                  id="usuario"
                  placeholder="USUÁRIO"
                  required
                  minlength="4"
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <div class="password-wrapper">
                  <input
                    type="password"
                    id="senha"
                    placeholder="SENHA"
                    required
                    minlength="6"
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    id="toggleSenha"
                    aria-label="Mostrar ou ocultar senha"
                  >
                    <i data-lucide="eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <div class="password-wrapper">
                  <input
                    type="password"
                    id="senhaConfirm"
                    placeholder="CONFIRMAR SENHA"
                    required
                    minlength="6"
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    id="toggleSenhaConfirm"
                    aria-label="Mostrar ou ocultar confirmação de senha"
                  >
                    <i data-lucide="eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <button
              type="submit"
              class="btn-primary register-btn"
              id="registerBtn"
            >
              Cadastrar
            </button>

            <div class="auth-link">
              <a href="index.html">Já tem conta? Fazer login</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../Javascript/Storage.js"></script>
    <script src="../Javascript/autenticacao.js"></script>

    <script>
      lucide.createIcons();

      const API_BASE_URL =
        'https://sistemafarmaceutico-production.up.railway.app/api';

      const btn = document.getElementById('registerBtn');
      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');
      const form = document.getElementById('registerForm');

      document.getElementById('nome').focus();

      function mostrarErro(msg) {
        successDiv.classList.add('hidden');
        errorDiv.textContent = msg;
        errorDiv.classList.remove('hidden');
      }

      function mostrarSucesso(msg) {
        errorDiv.classList.add('hidden');
        successDiv.textContent = msg;
        successDiv.classList.remove('hidden');
      }

      function toggleSenha(btnId, inputId) {
        const botao = document.getElementById(btnId);
        const input = document.getElementById(inputId);
        if (!botao || !input) return;
        botao.addEventListener('click', function () {
          const icon = this.querySelector('i');
          if (input.type === 'password') {
            input.type = 'text';
            if (icon) icon.setAttribute('data-lucide', 'eye-off');
          } else {
            input.type = 'password';
            if (icon) icon.setAttribute('data-lucide', 'eye');
          }
          lucide.createIcons();
        });
      }

      toggleSenha('toggleSenha', 'senha');
      toggleSenha('toggleSenhaConfirm', 'senhaConfirm');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const nome = document.getElementById('nome').value.trim();
        const email = document
          .getElementById('email')
          .value.trim()
          .toLowerCase();
        const telefone = document.getElementById('telefone').value.trim();
        const usuario = document.getElementById('usuario').value.trim();
        const senha = document.getElementById('senha').value;
        const senhaConfirm = document.getElementById('senhaConfirm').value;

        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        if (!nome) return mostrarErro('Informe o nome completo.');
        if (!email) return mostrarErro('Informe um e-mail válido.');
        if (usuario.length < 4)
          return mostrarErro('O usuário deve ter no mínimo 4 caracteres.');
        if (senha.length < 6)
          return mostrarErro('A senha deve ter no mínimo 6 caracteres.');
        if (senha !== senhaConfirm)
          return mostrarErro('As senhas não coincidem.');

        btn.disabled = true;
        btn.textContent = 'Cadastrando...';

        try {
          const resp = await fetch(`${API_BASE_URL}/cadastro/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome, email, telefone, usuario, senha }),
          });

          const data = await resp.json();

          if (!resp.ok || !data.sucesso) {
            mostrarErro(data.erro || 'Erro ao cadastrar. Tente novamente.');
            btn.disabled = false;
            btn.textContent = 'Cadastrar';
            return;
          }

          // Salva sessão automaticamente após cadastro
          localStorage.setItem(
            'farm_current_user',
            JSON.stringify(data.usuario)
          );
          localStorage.setItem('farm_session_token', `token_${Date.now()}`);

          mostrarSucesso('Conta criada com sucesso! Redirecionando...');
          btn.textContent = 'Sucesso!';

          setTimeout(() => {
            window.location.href = '/html/inicio.html';
          }, 1000);
        } catch (err) {
          mostrarErro('Não foi possível conectar ao servidor.');
          btn.disabled = false;
          btn.textContent = 'Cadastrar';
        }
      });
    </script>
  </body>
</html>
