<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Sistema Farmacêutico</title>
    <link rel="stylesheet" href="../CSS/base.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="register-page">
    <div class="auth-page">
      <div class="auth-container auth-wide">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-icon">
              <i data-lucide="user-plus"></i>
            </div>

            <h1 class="register-title">Cadastro de Usuário</h1>
            <p class="register-subtitle">Crie seu acesso ao sistema</p>
          </div>

          <div id="registerError" class="message error hidden"></div>
          <div id="registerSuccess" class="success-message hidden"></div>

          <form
            id="registerForm"
            class="register-form"
            autocomplete="off"
            novalidate
          >
            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="user" class="input-icon"></i>
                <input
                  type="text"
                  id="nome"
                  name="nome"
                  placeholder="NOME COMPLETO"
                  required
                  autocomplete="name"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="mail" class="input-icon"></i>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="E-MAIL"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="phone" class="input-icon"></i>
                <input
                  type="tel"
                  id="telefone"
                  name="telefone"
                  placeholder="TELEFONE"
                  inputmode="tel"
                  autocomplete="tel"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="user-check" class="input-icon"></i>
                <input
                  type="text"
                  id="usuario"
                  name="usuario"
                  placeholder="USUÁRIO"
                  required
                  minlength="4"
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <div class="password-wrapper">
                  <input
                    type="password"
                    id="senha"
                    name="senha"
                    placeholder="SENHA"
                    required
                    minlength="6"
                    autocomplete="new-password"
                  />

                  <button
                    type="button"
                    class="password-toggle"
                    id="toggleSenha"
                    aria-label="Mostrar ou ocultar senha"
                  >
                    <i data-lucide="eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <div class="form-field">
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <div class="password-wrapper">
                  <input
                    type="password"
                    id="senhaConfirm"
                    name="senhaConfirm"
                    placeholder="CONFIRMAR SENHA"
                    required
                    minlength="6"
                    autocomplete="new-password"
                  />

                  <button
                    type="button"
                    class="password-toggle"
                    id="toggleSenhaConfirm"
                    aria-label="Mostrar ou ocultar confirmação de senha"
                  >
                    <i data-lucide="eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <button
              type="submit"
              class="btn-primary register-btn"
              id="registerBtn"
            >
              Cadastrar
            </button>

            <div class="auth-link">
              <a href="index.html">Já tem conta? Fazer login</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../Javascript/Storage.js"></script>
    <script src="../Javascript/autenticacao.js"></script>
    <script src="../Javascript/cadastro.js"></script>

    <script>
      redirectIfAuthenticated();
      lucide.createIcons();

      const elNome = document.getElementById('nome');
      const elEmail = document.getElementById('email');
      const elTelefone = document.getElementById('telefone');
      const elUsuario = document.getElementById('usuario');
      const elSenha = document.getElementById('senha');
      const elSenhaConfirm = document.getElementById('senhaConfirm');

      const btn = document.getElementById('registerBtn');
      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');
      const form = document.getElementById('registerForm');

      if (elNome) elNome.focus();

      function mostrarErro(msg) {
        successDiv.classList.add('hidden');
        errorDiv.textContent = msg;
        errorDiv.classList.remove('hidden');
      }

      function mostrarSucesso(msg) {
        errorDiv.classList.add('hidden');
        successDiv.textContent = msg;
        successDiv.classList.remove('hidden');
      }

      function normalizarUsuario(v) {
        return (v || '').trim();
      }

      function normalizarEmail(v) {
        return (v || '').trim().toLowerCase();
      }

      function toggleSenha(btnId, inputId) {
        const botao = document.getElementById(btnId);
        const input = document.getElementById(inputId);

        if (!botao || !input) return;

        botao.addEventListener('click', function () {
          const icon = this.querySelector('i');

          if (input.type === 'password') {
            input.type = 'text';
            if (icon) icon.setAttribute('data-lucide', 'eye-off');
          } else {
            input.type = 'password';
            if (icon) icon.setAttribute('data-lucide', 'eye');
          }

          lucide.createIcons();
        });
      }

      toggleSenha('toggleSenha', 'senha');
      toggleSenha('toggleSenhaConfirm', 'senhaConfirm');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        const nome = (elNome.value || '').trim();
        const email = normalizarEmail(elEmail.value);
        const telefone = (elTelefone.value || '').trim();
        const usuario = normalizarUsuario(elUsuario.value);
        const senha = elSenha.value || '';
        const senhaConfirm = elSenhaConfirm.value || '';

        if (!nome) {
          mostrarErro('Informe o nome completo.');
          return;
        }

        if (!email) {
          mostrarErro('Informe um e-mail válido.');
          return;
        }

        if (usuario.length < 4) {
          mostrarErro('O usuário deve ter no mínimo 4 caracteres.');
          return;
        }

        if (senha.length < 6) {
          mostrarErro('A senha deve ter no mínimo 6 caracteres.');
          return;
        }

        if (senha !== senhaConfirm) {
          mostrarErro('As senhas não coincidem.');
          return;
        }

        let users = [];

        try {
          users = getUsers();
          if (!Array.isArray(users)) users = [];
        } catch (err) {
          users = [];
        }

        const usuarioExiste = users.some(
          (u) => normalizarUsuario(u?.usuario) === usuario
        );
        if (usuarioExiste) {
          mostrarErro('Este usuário já existe.');
          return;
        }

        const emailExiste = users.some(
          (u) => normalizarEmail(u?.email) === email
        );
        if (emailExiste) {
          mostrarErro('Este e-mail já está cadastrado.');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Cadastrando...';

        const novoUsuario = {
          id: Date.now(),
          usuario,
          senha,
          nome,
          email,
          telefone,
          tipo: 'caixa',
          criadoEm: new Date().toISOString(),
        };

        users.push(novoUsuario);
        saveUsers(users);

        mostrarSucesso('Conta criada com sucesso! Redirecionando...');
        btn.textContent = 'Sucesso!';

        try {
          const result = await login(usuario, senha, false);

          if (result && result.success) {
            window.location.href = 'inicio.html';
            return;
          }

          btn.disabled = false;
          btn.textContent = 'Cadastrar';
          mostrarErro(
            'Não foi possível fazer login automático. Faça login na tela inicial.'
          );
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Cadastrar';
          mostrarErro(
            'Erro ao fazer login automático. Faça login na tela inicial.'
          );
        }
      });
    </script>
  </body>
</html>
